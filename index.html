<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduStream AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

  <!-- ── Navbar (hidden until logged in) ───────────────── -->
  <nav class="es-navbar" id="navbar" style="display:none;">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <a href="#" class="es-brand" data-page="dashboard">EduStream<span>_AI</span></a>
        <div class="d-flex align-items-center gap-1" id="nav-links">
          <a href="#" class="nav-link" data-page="dashboard"><i class="bi bi-grid-3x3-gap me-1"></i>Dashboard</a>
          <a href="#" class="nav-link" data-page="catalogue"><i class="bi bi-search me-1"></i>Catalogue</a>
          <a href="#" class="nav-link" data-page="feedback"><i class="bi bi-chat-dots me-1"></i>Feedback</a>
          <button class="btn-es-outline ms-2" id="btn-logout" style="font-size:.8rem;padding:.35rem 1rem;">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── Toast / Flash messages ────────────────────────── -->
  <div id="toast-container" style="position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;"></div>

  <!-- ── Main SPA container ────────────────────────────── -->
  <main id="app" class="main-wrap"></main>

  <footer id="footer" style="display:none;border-top:1px solid var(--es-border);padding:1.5rem 0;position:relative;z-index:1;">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <span style="font-family:var(--font-display);font-size:.8rem;color:var(--es-muted);">EduStream<span style="color:var(--es-accent2);">_AI</span> &copy; 2025</span>
      <span style="font-size:.75rem;color:var(--es-muted);">PHP API + Vanilla JS · Bootstrap 5</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
